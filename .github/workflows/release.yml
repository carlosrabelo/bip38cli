# GitHub Actions Workflow for creating releases
# This workflow is triggered manually and builds cross-platform binaries.

name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up build variables
        id: vars
        run: |
          echo "bin_name=bip38cli" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build artifacts
        run: |
          set -e
          PROJECT_NAME=${{ steps.vars.outputs.bin_name }}
          RELEASE_VERSION=${{ github.event.inputs.version }}
          BUILD_TIME=${{ steps.vars.outputs.build_time }}
          
          # LDFLAGS to embed version info
          LDFLAGS="-s -w -X main.version=${RELEASE_VERSION} -X main.buildTime=${BUILD_TIME}"

          # Platforms to build for
          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"

          mkdir -p dist
          cp LICENSE README.md dist/

          for platform in $PLATFORMS; do
            GOOS=$(dirname ${platform})
            GOARCH=$(basename ${platform})
            
            OUTPUT_BASENAME="${PROJECT_NAME}-${RELEASE_VERSION}-${GOOS}-${GOARCH}"
            OUTPUT_BINNAME="${OUTPUT_BASENAME}"
            if [ "$GOOS" = "windows" ]; then
              OUTPUT_BINNAME+=".exe"
            fi

            echo "Building for ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS=${GOOS} GOARCH=${GOARCH} go build -trimpath -tags netgo -ldflags="${LDFLAGS}" -o "dist/${OUTPUT_BINNAME}" ./cmd/bip38cli

            cd dist
            if [ "$GOOS" = "windows" ]; then
              zip "${OUTPUT_BASENAME}.zip" "${OUTPUT_BINNAME}" LICENSE README.md
            else
              tar -czf "${OUTPUT_BASENAME}.tar.gz" "${OUTPUT_BINNAME}" LICENSE README.md
            fi
            rm "${OUTPUT_BINNAME}"
            cd ..
          done
          # Clean up the copied files
          rm dist/LICENSE dist/README.md

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz